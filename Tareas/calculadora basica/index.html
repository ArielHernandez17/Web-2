<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Operaciones</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    
    <div class="container">
        <h1>Operaciones Matemáticas</h1>
        
        <form id="SumForm">
            <div class="input-group">
                <label for="num1">Número 1:</label>
                <input type="number" id="num1" required step="any">
            </div>

            <div class="input-group">
                <label for="operacion">Operación:</label>
                <select id="operacion">
                    <option value="suma">Suma (+)</option>
                    <option value="resta">Resta (-)</option>
                    <option value="multi">Multiplicación (×)</option>
                    <option value="divi">División (÷)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="num2">Número 2:</label>
                <input type="number" id="num2" required step="any">
            </div>

            <button type="submit">Calcular</button>
        </form>

        <div id="result"></div>
    </div>

    <script src="app1.js"></script>
</body>
</html>
