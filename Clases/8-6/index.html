<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operaciones basicas</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Calculadora</h1>
    <p>Esta es una pagina para una calculadora</p>
    <form id="CalculadoraForm">
        <input type="number" id="num1" required placeholder="ingresa un numero">
        <input type="number" id="num2" required placeholder="ingresa un numero">
        <select id="operacion"required>
           <option value=""></option> 
           <option value="Suma">Suma +</option>
           <option value="Resta">Resta -</option>
           <option value="Multiplicacion">Multiplicacion * </option>    
           <option value="Division">Division / </option>
        </select>
        <button type="submit">Calcular</button>
    </form>
    <div id="resultado">

    </div>
</body>
<script src="app2"> </script>
</html>
