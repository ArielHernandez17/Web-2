<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        #carrito { margin-bottom: 20px; border: 1px solid #ccc; padding: 15px; border-radius: 8px; }
        form { background: #f9f9f9; padding: 15px; border-radius: 8px; display: inline-block; }
        .campo { margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="carrito">
        <h2>Tu Carrito</h2>
        <ul id="listaProductos">
            </ul>
        <p><strong>Total: $<span id="total-compra">0.00</span></strong></p>
    </div>

    <form id="formulario">
        <div class="campo">
            <label for="nombre-producto">Producto:</label><br>
            <input type="text" id="nombre-producto" placeholder="Ej. Camisa" required>
        </div>
        
        <div class="campo">
            <label for="precio-producto">Precio:</label><br>
            <input type="number" id="precio-producto" placeholder="0.00" step="0.01" required>
        </div>

        <div class="campo">
            <label for="cantidad-producto">Cantidad:</label><br>
            <input type="number" id="cantidad-producto" value="1" min="1" required>
        </div>

        <button type="submit">Agregar al carrito</button>
    </form>

    <script src="app.js"></script>
</body>
</html>
