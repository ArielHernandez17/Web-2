<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de QR</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <header>
        <h1>Generador de QR</h1>
    </header>

    <div class="contenedor">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ingresa nombre completo">
        <br><br>

        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electrónico">
        <br><br>

        <label for="telefono">Número de teléfono:</label>
        <input type="tel" id="telefono" placeholder="Ingresa tu número de teléfono">
        <br><br>

        <label for="institucion">Institución:</label>
        <input type="text" id="institucion" list="ListInstitucion" placeholder="Selecciona una institución">
        
        <datalist id="ListInstitucion">
            <option value="Instituto Tecnológico de Morelia">
            <option value="Universidad Michoacana de San Nicolás de Hidalgo">
            <option value="Universidad Autónoma de Querétaro">
            <option value="Instituto Politécnico Nacional">
            <option value="Universidad Nacional Autónoma de México">
        </datalist>
        <br><br>

        <button id="btnGenerate">Generar QR</button>

        <div id="qrContainer" style="text-align: center; margin-top: 20px;">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
