<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genarador de qr</title>
</head>
<body>
    <header>
        <h1>Generador de QR</h1>
    </header>
    <div>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" placeholder="Ingresa nombre completo" required maxlength="100">      
        <br>
        <label for="email">Correo electrónico:</label>
        <input type="email" id="email" placeholder="Ingresa tu correo electrónico" required maxlength="100">
        <br>
        <label for="telefono">Número de teléfono:</label>
        <input type="tel" id="telefono" placeholder="Ingresa tu número de teléfono  " required maxlength="15">
        <br>
        <label for="institucion">Institución:</label>
            <input type="text" id="institucion" list="ListInstitucion" placeholder="Selecciona una institución" required>
        <datalist id="ListInstitucion">
            <option value="Instituto Tecnológico de Morelia"></option>
            <option value="Universidad Michoacana de San Nicolás de Hidalgo"></option>
            <option value="Universidad Autónoma de Querétaro"></option>
            <option value="Instituto Politécnico Nacional"></option>
            <option value="Universidad Nacional Autónoma de México"></option>
        </datalist>
        <br>
        <button id="generate">Generar QR</button>

        <div style="text-align: center;" id="qrCode">
            <!--aqui va a estar el qr generado-->

        </div>
    </div>|
</body>
</html>
